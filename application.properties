camel.main.name=camel-weather-poc
camel.main.routes-include-pattern=process.camel.yaml

camel.server.enabled=true
camel.server.port=8080

camel.health.enabled=true
camel.management.enabled=true

# ---- App-specific config ----------------------------------------------
# JSONMOCKDB gate. Read by process.camel.yaml at startup as {{jsonmockdb}}.
#   true  -> /process requires (name, city) registered via POST /users first
#   false -> /process always does the weather lookup (default)
#
# Override precedence (Camel Main):
#   1. OS env var      JSONMOCKDB=true camel run process.camel.yaml
#   2. System property -Djsonmockdb=true
#   3. This file       jsonmockdb=true  (edit and restart)
# In Kubernetes the deployment passes JSONMOCKDB as an env var
# (see k8s/deployment.yaml); change the value and re-apply or use
# `kubectl set env deploy/camel-weather-poc JSONMOCKDB=true`.
jsonmockdb=false
