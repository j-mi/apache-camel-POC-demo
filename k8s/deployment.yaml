apiVersion: apps/v1
kind: Deployment
metadata:
  name: camel-weather-poc
  labels:
    app: camel-weather-poc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: camel-weather-poc
  template:
    metadata:
      labels:
        app: camel-weather-poc
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: app
          image: camel-weather-poc:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            # Flip to "true" to require POST /users registration before /process succeeds.
            - name: JSONMOCKDB
              value: "false"
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
